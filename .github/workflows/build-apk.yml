name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses > /dev/null 2>&1
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=SP,OU=Dev,O=Dev,L=Dhaka,ST=Dhaka,C=BD"

      - name: Create Android Project
        run: |
          mkdir -p twa/app/src/main/res/values
          
          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "Pipeline"
          include ":app"
          EOF
          
          cat > twa/build.gradle << 'EOF'
          plugins {
            id "com.android.application" version "8.2.0" apply false
          }
          EOF
          
          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
          
          cat > twa/app/build.gradle << 'EOF'
          plugins { id "com.android.application" }
          android {
            namespace "com.henaakter.salespipeline"
            compileSdk 34
            defaultConfig {
              applicationId "com.henaakter.salespipeline"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
            signingConfigs {
              release {
                storeFile file("../../release.keystore")
                storePassword "android"
                keyAlias "release"
                keyPassword "android"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
              }
            }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
          }
          EOF
          
          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
              android:label="Sales Pipeline"
              android:theme="@android:style/Theme.Translucent.NoTitleBar">
              <meta-data android:name="asset_statements" android:resource="@string/assetStatements"/>
              <activity
                android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:exported="true">
                <meta-data
                  android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://henaakter152.github.io/sales-pipeline/"/>
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW"/>
                  <category android:name="android.intent.category.DEFAULT"/>
                  <category android:name="android.intent.category.BROWSABLE"/>
                  <data android:scheme="https" android:host="henaakter152.github.io" android:pathPrefix="/sales-pipeline/"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF
          
          cat > twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="assetStatements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://henaakter152.github.io"}}]</string>
          </resources>
          EOF

      - name: Build APK
        working-directory: twa
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalesPipeline-APK
          path: twa/app/build/outputs/apk/release/app-release.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "Sales Pipeline APK v${{ github.run_number }}"
          files: twa/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
