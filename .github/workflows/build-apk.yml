name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install dependencies & build web app
        run: |
          npm install
          npm run build
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli
        
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore ${{ runner.temp }}/release.keystore \
            -alias pipeline \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pipeline123 \
            -keypass pipeline123 \
            -dname "CN=Hena Akter, OU=Dev, O=SalesPipeline, L=Dhaka, ST=Dhaka, C=BD"
            
      - name: Initialize TWA project
        run: |
          bubblewrap init \
            --manifest=https://henaakter152.github.io/sales-pipeline/manifest.json \
            --directory=android
            
      - name: Build APK with Bubblewrap
        run: |
          cd android
          bubblewrap build
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalesPipeline-APK
          path: android/app/build/outputs/apk/release/*.apk
