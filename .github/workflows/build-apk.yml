name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Install & build web
        run: |
          npm install
          npm run build
          
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias pipeline \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pipeline123 \
            -keypass pipeline123 \
            -dname "CN=A, OU=A, O=A, L=A, ST=A, C=BD"

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA (non-interactive)
        run: |
          mkdir -p twa
          cat > twa/twa-manifest.json << 'TWAJSON'
          {
            "packageId": "com.henaakter.salespipeline",
            "host": "henaakter152.github.io",
            "name": "Sales Pipeline CRM",
            "launcherName": "Pipeline",
            "display": "standalone",
            "themeColor": "#1A1A1A",
            "backgroundColor": "#FAFAF8",
            "startUrl": "/sales-pipeline/",
            "iconUrl": "https://henaakter152.github.io/sales-pipeline/icon-512.svg",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "../release.keystore",
              "alias": "pipeline"
            }
          }
          TWAJSON
          
          cd twa
          bubblewrap init --manifest=https://henaakter152.github.io/sales-pipeline/manifest.json
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sales-pipeline-apk
          path: twa/app/build/outputs/apk/release/*.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-v${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          files: twa/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
