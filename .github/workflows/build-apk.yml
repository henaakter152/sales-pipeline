name: Build APK with Bubblewrap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias pipeline \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pipeline123 -keypass pipeline123 \
            -dname "CN=SP,OU=D,O=S,L=D,ST=D,C=BD"

      - name: Init TWA project (non-interactive)
        run: |
          mkdir twa-project
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "com.henaakter.salespipeline",
            "host": "henaakter152.github.io",
            "name": "Sales Pipeline CRM",
            "launcherName": "Pipeline",
            "display": "standalone",
            "themeColor": "#1A1A1A",
            "backgroundColor": "#FAFAF8",
            "startUrl": "/sales-pipeline/",
            "iconUrl": "https://henaakter152.github.io/sales-pipeline/icon-512.svg",
            "maskableIconUrl": "https://henaakter152.github.io/sales-pipeline/icon-512.svg",
            "splashScreenFadeOutDuration": 300,
            "navigationColor": "#1A1A1A",
            "navigationColorDark": "#000000",
            "orientation": "any",
            "webManifestUrl": "https://henaakter152.github.io/sales-pipeline/manifest.json",
            "signingKey": { "path": "../release.keystore", "alias": "pipeline" }
          }
          EOF
          
          # Use expect to auto-answer prompts
          sudo apt-get update -qq && sudo apt-get install -y -qq expect
          
          expect << 'EXPECT'
          set timeout 120
          spawn bubblewrap init --manifest=https://henaakter152.github.io/sales-pipeline/manifest.json --directory=twa-project
          expect "Domain:" { send "\r" }
          expect "URL path:" { send "\r" }
          expect "name:" { send "\r" }
          expect "short name:" { send "\r" }
          expect "theme color:" { send "\r" }
          expect "background color:" { send "\r" }
          expect "display mode:" { send "\r" }
          expect "orientation:" { send "\r" }
          expect eof
          EXPECT

      - name: Build APK
        working-directory: twa-project
        run: |
          export BUBBLEWRAP_KEYSTORE_PASSWORD=pipeline123
          export BUBBLEWRAP_KEY_PASSWORD=pipeline123
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pipeline-APK
          path: |
            twa-project/app-release-signed.apk
            twa-project/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.run_number }}
          name: "APK v${{ github.run_number }}"
          files: twa-project/app-release-signed.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
